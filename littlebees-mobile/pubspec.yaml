name: little_bees
description: "Little Bees - App móvil para padres de familia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking (API NestJS — sin Supabase)
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3
  hive_flutter: ^1.1.0

  # UI & Design
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.1.3
  circular_menu: ^4.0.0

  # Images
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  file_picker: ^10.3.2
  record: ^6.1.1
  just_audio: ^0.10.5
  url_launcher: ^6.3.2
  video_compress: ^3.1.4
  video_player: ^2.11.1

  # Calendar
  table_calendar: ^3.1.3

  # Charts (alineado con web: Recharts → fl_chart)
  fl_chart: ^0.70.2

  # WebSockets (alineado con web: socket.io-client)
  socket_io_client: ^3.0.2
  flutter_webrtc: ^1.4.0
  flutter_ringtone_player: ^4.0.0+4
  vibration: ^3.1.8

  # Utilities
  intl: ^0.20.2
  gap: ^3.0.1
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4

  # Splash & Icons
  flutter_native_splash: ^2.4.2
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
