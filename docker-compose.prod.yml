version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: littlebees-postgres
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: kinderspace
      POSTGRES_PASSWORD: kinderspace
      POSTGRES_DB: kinderspace_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinderspace"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - littlebees-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: littlebees-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - littlebees-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: littlebees-minio
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: kinderspace
      MINIO_ROOT_PASSWORD: kinderspace123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - littlebees-network

  # Backend API (NestJS)
  api:
    build:
      context: .
      dockerfile: littlebees-web/apps/api/Dockerfile
    container_name: littlebees-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://kinderspace:kinderspace@postgres:5432/kinderspace_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: kinderspace
      MINIO_SECRET_KEY: kinderspace123
      MINIO_BUCKET: kinderspace-files
      MINIO_USE_SSL: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      CORS_ORIGINS: http://216.250.125.239:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - littlebees-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web (Next.js)
  web:
    build:
      context: .
      dockerfile: littlebees-web/apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://little-bees.cbluna-dev.com/api/v1
    container_name: littlebees-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://little-bees.cbluna-dev.com/api/v1
    depends_on:
      - api
    networks:
      - littlebees-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  littlebees-network:
    driver: bridge
